name: Build geoip files
on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ./go.mod

      - name: Set variables
        run: |
          echo "TAG_NAME=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
          echo "RELEASE_NAME=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
        shell: bash

      - name: Build geoip files
        run: |
          go run ./

      - name: Verify mmdb files
        run: |
          cd ./output/maxmind || exit 1
          go install -v github.com/maxmind/mmdbverify@latest
          for name in $(ls *.mmdb); do
            $(go env GOPATH)/bin/mmdbverify -file ${name}
          done

      - name: Generate sha256 checksum for mmdb files
        run: |
          cd ./output/maxmind || exit 1
          for name in $(ls *.mmdb); do
            sha256sum ${name} > ./${name}.sha256sum
          done

      - name: Move files to publish directory
        run: |
          mkdir -p publish
          mv ./output/maxmind/*.mmdb ./output/maxmind/*.sha256sum ./publish/
          cp ./output/text/cn.txt ./publish/

      - name: Git push assets to "release" branch
        run: |
          cd publish || exit 1
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add -A
          git commit -m "${{ env.RELEASE_NAME }}"
          git remote add geoip "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f -u geoip release

      # - name: Upload files to GitHub release
      #   uses: svenstaro/upload-release-action@v2
      #   with:
      #     repo_token: ${{ secrets.GITHUB_TOKEN }}
      #     file_glob: true
      #     file: ./publish/*
      #     tag: ${{ env.TAG_NAME }}
      - name: Install ossutil
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y unzip

          curl -L \
            https://gosspublic.alicdn.com/ossutil/v2/2.3.0/ossutil-2.3.0-linux-amd64.zip \
            -o ossutil.zip

          unzip ossutil.zip
          sudo mv ossutil-2.3.0-linux-amd64/ossutil /usr/local/bin/ossutil
          sudo chmod +x /usr/local/bin/ossutil

          ossutil version

      - name: Upload files to OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ACCESS_KEY_SECRET }}
          OSS_REGION: cn-hangzhou
          OSS_ENDPOINT: oss-cn-hangzhou.aliyuncs.com
        run: |
          set -euo pipefail

          test -n "$OSS_ACCESS_KEY_ID"
          test -n "$OSS_ACCESS_KEY_SECRET"

          ossutil cp ./publish/ oss://glash/ \
            --recursive \
            --force \
            --exclude ".*" \
            --exclude "*/.*" \
            --exclude "*.sha256sum"
